name: ci

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4   # version read from package.json "packageManager"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r --filter "./packages/*" build
      - run: node scripts/check-lockstep.mjs   # lockstep release invariant (CONSENSUS_CHANGES.md); needs built dist/ (M4)
      # Per-package conformance. The node-dependent suites (client/light) and the live oracle
      # skip cleanly when there is no CSD node (CI has none); the deterministic core
      # (codec/crypto/tx/vectors) + edge + the pure security checks run and gate every push.
      - run: pnpm -r --filter "./packages/*" test
      - run: pnpm exec tsx test/edge.test.ts
      - run: pnpm exec tsx test/security.test.ts
      - run: pnpm exec tsx test/oracle.test.ts   # skips if no node (exit 0)

  conformance:
    # Cross-language byte-contract guard (JS ⇄ Python). The resolver, the record codec,
    # and SIWC each have a Python reference (conformance/*_ref.py); they MUST stay
    # byte-identical to the JS canonical impl or the chain forks across implementations.
    # This is the REAL lockstep guard — it runs as its OWN job so it is enforced
    # independently of the version-lockstep check (check-lockstep.mjs) in `test`, which
    # passes and gates releases (it is NOT intentionally red).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r --filter "./packages/*" build
      # crosscheck (records/codec + C1 trailing-control-char parse gate) + crosscheck-regex
      # (direct regex-vs-regex differential over raw control chars) + crosscheck-resolve +
      # crosscheck-siwc + nprofile-crosslang (v1.9 parse/resolve/dormancy + constant PARITY) +
      # 1500-iter fuzz (now emits nprofile), each asserting JS == Python. See conformance/README.md.
      - run: pnpm test:crosslang
